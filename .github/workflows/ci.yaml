name: CI
on:
  push:
    branches: [main]
  pull_request:
jobs:
  server:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          path: forge
      - uses: actions/checkout@v4
        with:
          repository: fromforgesoftware/go-kit
          path: go-kit
      - uses: actions/setup-go@v5
        with:
          go-version-file: forge/server/go.mod
      - name: server build + vet + test (go-kit via workspace)
        run: |
          cd forge/server
          go work init . ../../go-kit
          go build ./...
          go vet ./...
          go test ./...
