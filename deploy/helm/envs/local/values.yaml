replicaCount: 1

database:
  host: postgres
  port: '5432'
  name: forge
  schema: forge
  ssl: disable
  username: forge
  password: forge

# DEV ONLY — seeds a user you can sign into Forge with, and the managed
# app registry (in-cluster admin API URLs). Well-known dev credentials.
bootstrap:
  enabled: true
  adminEmail: admin@forge.local
  adminPassword: admin1234
  adminName: Administrator
  # Each entry is slug=Name=adminBaseURL[=moduleUri]. adminBaseURL is the
  # gateway-internal admin API; the optional 4th field moduleUri is the
  # browser-reachable Module-Federation remote (remoteEntry.js) the console
  # loads at runtime — the Grafana-equivalent of a plugin's module.js.
  # Convention: http://forge-<svc>/console/remoteEntry.js (each app's own svc
  # serves its console remote; the upcoming per-app remotes wire in here).
  # talos/gjallarhorn/gleipnir/aegis ship a console remote; catalog/adoptions
  # have none yet so they omit moduleUri.
  apps: 'aegis=Aegis=http://forge-aegis=http://forge-aegis/console/remoteEntry.js,talos=Talos=http://forge-talos=http://forge-talos/console/remoteEntry.js,gjallarhorn=Gjallarhorn=http://forge-gjallarhorn=http://forge-gjallarhorn/console/remoteEntry.js,gleipnir=Gleipnir=http://forge-gleipnir=http://forge-gleipnir/console/remoteEntry.js,catalog=Catalog=http://forge-catalog,adoptions=Adoptions=http://forge-adoptions'

# DEV — log into Forge via the aegis master realm (OIDC authorization-code +
# PKCE). The issuer must resolve to aegis from BOTH the forge pod (server-side
# discovery/token) and the browser (authorize redirect), and match the iss aegis
# mints from the request Host. In this no-ingress kind setup that means using
# the in-cluster name `forge-aegis` and making the browser resolve it too:
#   1) /etc/hosts:  127.0.0.1 forge-aegis
#   2) sudo kubectl port-forward svc/forge-aegis 80:80
# See examples/petstore/VERIFY.md.
oidcProviders: '[{"id":"aegis","name":"Aegis","issuer":"http://forge-aegis/realms/master","clientId":"forge","scopes":["openid","email","profile"]}]'

resources:
  requests: { cpu: 25m, memory: 128Mi }
  limits: { cpu: '1', memory: 512Mi }

gatewaySecret: dev-forge-gateway-secret
